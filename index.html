<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de CI/CD en AzureDevops</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            background:linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);
            color:white;
        }

        body::before{
            content:"";
            position:absolute;
            width:500px;
            height:500px;
            background:radial-gradient(circle,#22d3ee88,transparent 70%);
            top:-100px;
            left:-100px;
            filter:blur(60px);
        }

        body::after{
            content:"";
            position:absolute;
            width:500px;
            height:500px;
            background:radial-gradient(circle,#a855f788,transparent 70%);
            bottom:-100px;
            right:-100px;
            filter:blur(70px);
        }

        .card{
            position:relative;
            z-index:1;
            text-align:center;
            padding:50px;
            border-radius:20px;
            background:rgba(255,255,255,.12);
            backdrop-filter:blur(12px);
            box-shadow:0 20px 40px rgba(0,0,0,.3);
            max-width:700px;
            width:90%;
        }

        h1{
            font-size:2.5rem;
            margin-bottom:20px;
        }

        h2{
            font-weight:300;
            color:#dbeafe;
        }

        @media(max-width:600px){
            h1{
                font-size:1.8rem;
            }

            h2{
                font-size:1rem;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Prueba de CI/CD en AzureDevops</h1>
    <h2>by Victor Adrian Gutierrez Cervantes</h2>
</div>

</body>
</html>
